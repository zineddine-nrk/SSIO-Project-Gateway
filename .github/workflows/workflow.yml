name: CI pipeline for ssio project

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build docker image
        run: docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/ssio-project-gateway:latest .

      - name: Push docker image
        run: docker push ${{ secrets.DOCKER_HUB_USERNAME }}/ssio-project-gateway:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
   
    steps:
    - name: Deploy over SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }} # IP publique de l'instance EC2
        username: ${{ secrets.EC2_USER }} # ubuntu user
        key: ${{ secrets.EC2_SSH_PRIVATE_KEY }} # Clé privée SSH de l'instance EC2 pour se connecter.
        script: |
          cd ssio-project-full-backend

          # si .env n'existe pas → le créer
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          echo "Stopping old containers..."
          docker compose -f docker-compose/orion-wilma.yml --env-file .env down -v

          echo "Pulling latest images..."
          docker compose -f docker-compose/orion-wilma.yml --env-file .env pull

          echo "Starting services..."
          docker compose -f docker-compose/orion-wilma.yml --env-file .env up -d

          echo "Clean unused images..."
          docker image prune -f
